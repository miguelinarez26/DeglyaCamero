name: Supabase Keep-Alive (Anti-Pause)

on:
  schedule:
    # Se ejecuta cada 3 días a las 00:00 UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive query to Supabase
        run: |
          curl -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
